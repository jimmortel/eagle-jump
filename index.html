<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk/dist/index.min.js"></script>
    <title>Eagle Jump - Royal Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-container">
            <div id="score-display">ALTITUDE: <span id="current-score">0</span>m</div>
            <div id="balance-display">💰 <span id="tysm-balance">0</span> $TYSM</div>
        </div>

        <div id="menu-screen" class="overlay">
            <h1>EAGLE JUMP</h1>
            
                        <div id="shop-container">
            <div class="shop-item selected" onclick="selectSkin('1000009508.png', 0, this)">
                <img src="1000009508.png" style="width:70px">
                <p>ROYAL (Gratuit)</p>
            </div>
            <div class="shop-item" onclick="selectSkin('1000009505.png', 0.01, this)">
                <img src="1000009505.png" style="width:70px">
                <p>GOLD (0.01 SOL)</p>
            </div>
        </div>

        <button onclick="startGame()">S'ENVOLER</button>

        <img id="eagle" src="1000009508.png" alt="Eagle Player">
    </div>

    <script src="script.js"></script>
</body>
</html>
