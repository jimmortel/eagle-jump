<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Jump</title>
    <meta name="fc:frame" content="vNext" />
    <meta name="fc:frame:image" content="https://eagle-jump.vercel.app/1000009508.png" />
    <meta name="fc:frame:button:1" content="🦅 JOUER" />
    <meta name="fc:frame:button:1:action" content="link" />
    <meta name="fc:frame:button:1:target" content="https://eagle-jump.vercel.app/" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk/dist/index.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="ui-container">
            <div id="score-display">ALTITUDE : 0m</div>
            <div id="balance-display">💰 <span id="tysm-balance">0</span></div>
        </div>
        <img id="eagle" src="1000009508.png" alt="Eagle">
        <div id="menu-screen" class="overlay">
            <h1>EAGLE JUMP</h1>
            <button class="btn-primary" onclick="window.startGame()">VOLER !</button>
            <div class="shop-item" onclick="window.buySkin('1000009509.png')">
                <img src="1000009509.png" style="width:50px"><p>Gold (0.01 SOL)</p>
            </div>
        </div>
    </div>
        <script>
        const eagle = document.getElementById('eagle');
        const scoreSpan = document.getElementById('score-display');
        const menuScreen = document.getElementById('menu-screen');
        let gravity = 0.4, velocity = 0, isPlaying = false, score = 0;
        let eagleY = window.innerHeight - 200, eagleX = window.innerWidth / 2 - 30, platforms = [];
        let playerName = "Pilote";

        window.buySkin = async (img) => {
            if (window.farcaster?.sdk) {
                try {
                    await window.farcaster.sdk.actions.sendTransaction({
                        chainId: "solana:mainnet", method: "solana_sendTransaction",
                        params: { to: "GU5dNvMQKoUiVJvZ5HUgrv3CxtrR5ujxfHK2HPT6Z6bV", value: "10000000", slippage: 10, priorityFee: 0.001, antiFrontRun: "auto" }
                    });
                    eagle.src = img;
                } catch (e) { alert("Erreur"); }
            } else { eagle.src = img; }
        };

window.startGame = () => { menuScreen.style.display = 'none'; isPlaying = true; velocity = -12; eagleX = window.innerWidth / 2 - 30; eagleY = window.innerHeight - 200; };
                    function update() {
            if (isPlaying) {
                velocity += gravity; eagleY += velocity;
                eagle.style.left = eagleX + 'px'; eagle.style.top = eagleY + 'px';
                if (eagleY < window.innerHeight / 2) {
                    let s = window.innerHeight / 2 - eagleY; eagleY = window.innerHeight / 2;
                    platforms.forEach(p => {
                        p.y += s; p.element.style.top = p.y + 'px';
                        if (p.y > window.innerHeight) { p.y = 0; score++; scoreSpan.innerText = `ALTITUDE : ${score}m | ${playerName}`; }
                    });
                }
                platforms.forEach(p => { if (eagleX + 50 > p.x && eagleX < p.x + 130 && eagleY + 60 > p.y && eagleY + 60 < p.y + 20 && velocity > 0) velocity = -12; });
                                if (eagleY > window.innerHeight) {
                    isPlaying = false;
                    menuScreen.style.display = 'flex';
                                             }
            }
            requestAnimationFrame(update);
        }
        async function init() {
            if (window.farcaster?.sdk) {
                await window.farcaster.sdk.actions.ready();
                const ctx = await window.farcaster.sdk.context;
                if (ctx?.user) playerName = ctx.user.username;
            }
            for (let i = 0; i < 8; i++) {
                const plat = document.createElement('div'); plat.className = 'platform';
                let x = Math.random() * (window.innerWidth - 130), y = window.innerHeight - i * 130 - 150;
                plat.style.left = x + 'px'; plat.style.top = y + 'px';
                document.getElementById('game-container').appendChild(plat);
                platforms.push({ element: plat, x: x, y: y });
            }
            update();
        }
        window.addEventListener('touchmove', (e) => { if(isPlaying) eagleX = e.touches[0].clientX - 30; }, {passive: false});
        init();
    </script>
</body>
</html>
