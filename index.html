<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk/dist/index.min.js"></script>
    <title>Eagle Jump - Royal Shop</title>
    <link rel="stylesheet" href="style.css">
         <meta name="fc:frame" content="vNext" />
    <meta name="fc:frame:image" content="https://eagle-jump.vercel.app/1000009508.png" />
    <meta name="fc:frame:button:1" content="🦅 JOUER MAINTENANT" />
    <meta name="fc:frame:button:1:action" content="link" />
    <meta name="fc:frame:button:1:target" content="https://eagle-jump.vercel.app/" />
    <meta property="og:title" content="Eagle Jump" />
    <meta property="og:image" content="https://eagle-jump.vercel.app/1000009508.png" />
</head>
<body>
    <div id="game-container">
        <div id="ui-container">
            <div id="score-display">ALTITUDE: <span id="current-score">0</span>m</div>
            <div id="balance-display">💰 <span id="tysm-balance">0</span> $TYSM</div>
        </div>

        <div id="menu-screen" class="overlay">
            <h1>EAGLE JUMP</h1>
            
                        <div id="shop-container">
            <div class="shop-item selected" onclick="selectSkin('1000009508.png', 0, this)">
                <img src="1000009508.png" style="width:70px">
                <p>ROYAL (Gratuit)</p>
            </div>
            <div class="shop-item" onclick="selectSkin('1000009505.png', 0.01, this)">
                <img src="1000009505.png" style="width:70px">
                <p>GOLD (0.01 SOL)</p>
            </div>
        </div>

        <button onclick="startGame()">S'ENVOLER</button>
            <button onclick="showLeaderboard()" style="background: #444; margin-top: 10px; font-size: 14px;">CLASSEMENT</button>

<div id="leaderboard-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#222; padding:20px; border:2px solid #FFD700; z-index:100; border-radius:15px; width:80%;">
    <h3 style="color:#FFD700; text-align:center;">TOP AIGLES 🦅</h3>
    <div id="leaderboard-list" style="color:white; font-size:14px; margin-bottom:15px;">Chargement...</div>
    <button onclick="document.getElementById('leaderboard-modal').style.display='none'">FERMER</button>
</div>

        <img id="eagle" src="1000009508.png" alt="Eagle Player">
    </div>

    <script src="script.js"></script>
</body>
</html>
