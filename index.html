<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle-Jump</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        canvas { background: #87CEEB; touch-action: none; width: 100%; height: 100%; max-width: 400px; max-height: 600px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Ajustement automatique de la résolution interne
        canvas.width = 320;
        canvas.height = 480;

        let eagle = { x: 140, y: 200, width: 40, height: 40, vy: 0, jumpPower: -10, gravity: 0.4 };
        let platforms = [];
        let score = 0;
        let gameRunning = true;

        // Créer les plateformes initiales
        for (let i = 0; i < 7; i++) {
            platforms.push({
                x: Math.random() * (canvas.width - 60),
                y: canvas.height - (i * 80),
                width: 60, height: 15
            });
        }

        // Contrôles tactiles simplifiés
        canvas.addEventListener('touchstart', (e) => {
            const touchX = e.touches[0].clientX;
            const screenMid = window.innerWidth / 2;
            if (touchX < screenMid) eagle.x -= 30;
            else eagle.x += 30;
            e.preventDefault();
        }, {passive: false});

        function update() {
            if (!gameRunning) return;

            eagle.vy += eagle.gravity;
            eagle.y += eagle.vy;

            // Rebond
            if (eagle.vy > 0) {
                platforms.forEach(p => {
                    if (eagle.x + eagle.width > p.x && eagle.x < p.x + p.width &&
                        eagle.y + eagle.height > p.y && eagle.y + eagle.height < p.y + p.height + eagle.vy) {
                        eagle.vy = eagle.jumpPower;
                    }
                });
            }

            // Caméra
            if (eagle.y < canvas.height / 2) {
                let diff = (canvas.height / 2) - eagle.y;
                eagle.y = canvas.height / 2;
                score += Math.floor(diff / 10);
                platforms.forEach(p => {
                    p.y += diff;
                    if (p.y > canvas.height) {
                        p.y = 0;
                        p.x = Math.random() * (canvas.width - 60);
                    }
                });
            }

            // Game Over
            if (eagle.y > canvas.height) {
                eagle.y = 200; eagle.vy = 0; score = 0; // Reset auto au lieu de l'alert
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#333"; // Aigle
            ctx.fillRect(eagle.x, eagle.y, eagle.width, eagle.height);

            ctx.fillStyle = "#C0C0C0"; // Ailes
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.width, p.height));

            ctx.fillStyle = "black";
            ctx.font = "20px Arial";
            ctx.fillText("Altitude: " + score + "m", 10, 30);
        }

        update();
    </script>
</body>
</html>
