<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Jump - Royal Degen Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-container">
            <div id="score-display">Score: <span id="current-score">0</span>m</div>
            <div id="high-score-display">Best: <span id="best-score">519</span>m</div>
        </div>

        <img id="eagle" src="images/1000009512.png" alt="Aigle Joueur">

        <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p>Ton score : <span id="final-score">0</span>m</p>
            <button id="restart-btn">Rejouer</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
