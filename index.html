<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Jump Gold</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: fixed; }
        canvas { background: #87CEEB; touch-action: none; width: 90vw; height: 85vh; max-width: 320px; max-height: 480px; object-fit: contain; border: 3px solid #D4AF37; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 320;
        canvas.height = 480;

        // --- CHARGEMENT DES IMAGES ---
        const imgEagle = new Image();
        imgEagle.src = '1000009475.jpg'; // Ton aigle doré

        // --- VARIABLES ---
        let eagle = { x: 140, y: 300, width: 50, height: 40, vy: 0, vx: 0, jumpPower: -11, gravity: 0.4 };
        let platforms = [];
        let score = 0;
        let highscore = localStorage.getItem('eagleRecord') || 0; // Sauvegarde le record sur le téléphone
        let moveLeft = false;
        let moveRight = false;

        for (let i = 0; i < 7; i++) {
            platforms.push({ x: Math.random() * (canvas.width - 60), y: canvas.height - (i * 80), width: 60, height: 15 });
        }

        // --- CONTRÔLES ---
        canvas.addEventListener('touchstart', (e) => {
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) moveLeft = true;
            else moveRight = true;
            e.preventDefault();
        }, {passive: false});
        canvas.addEventListener('touchend', () => { moveLeft = false; moveRight = false; });

        function update() {
            if (moveLeft) eagle.vx = -6;
            else if (moveRight) eagle.vx = 6;
            else eagle.vx *= 0.8;

            eagle.x += eagle.vx;
            eagle.vy += eagle.gravity;
            eagle.y += eagle.vy;

            if (eagle.x + eagle.width < 0) eagle.x = canvas.width;
            if (eagle.x > canvas.width) eagle.x = -eagle.width;

            if (eagle.vy > 0) {
                platforms.forEach(p => {
                    if (eagle.x + eagle.width > p.x && eagle.x < p.x + p.width &&
                        eagle.y + eagle.height > p.y && eagle.y + eagle.height < p.y + p.height + eagle.vy) {
                        eagle.vy = eagle.jumpPower;
                    }
                });
            }

            if (eagle.y < canvas.height * 0.7) {
                let diff = (canvas.height * 0.7) - eagle.y;
                eagle.y = canvas.height * 0.7;
                score += Math.floor(diff);
                platforms.forEach(p => {
                    p.y += diff;
                    if (p.y > canvas.height) { p.y = 0; p.x = Math.random() * (canvas.width - 60); }
                });
            }

            // --- GESTION DU RECORD ---
            if (eagle.y > canvas.height) { 
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem('eagleRecord', highscore); // Sauvegarde
                }
                eagle.y = 300; eagle.vy = 0; eagle.vx = 0; score = 0; 
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            let skyColor = "#87CEEB"; 
            if (score > 500) skyColor = "#4A90E2";
            if (score > 1500) skyColor = "#1A2A6C";
            if (score > 3000) skyColor = "#050505";
            ctx.fillStyle = skyColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dessin de l'Aigle (Image)
            ctx.drawImage(imgEagle, eagle.x, eagle.y, eagle.width, eagle.height);

            // Dessin Plateformes
            ctx.fillStyle = "#D4AF37"; // Couleur Or pour aller avec l'aigle
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });

            // Affichage Score & Record
            ctx.fillStyle = score > 1500 ? "white" : "#2C3E50";
            ctx.font = "bold 18px Arial";
            ctx.fillText("Altitude: " + score + "m", 15, 30);
            ctx.font = "14px Arial";
            ctx.fillText("Record: " + highscore + "m", 15, 55);
        }
        update();
    </script>
</body>
</html>
