    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 320;
        canvas.height = 480;

        // --- CHARGEMENT DES IMAGES (On force le JPG qui est sur ton GitHub !) ---
        const imgEagle = new Image();
        imgEagle.src = '1000009475.jpg'; 

        let eagleLoaded = false;
        imgEagle.onload = () => { eagleLoaded = true; };

        // --- VARIABLES JEU ---
        let eagle = { x: 130, y: 100, width: 60, height: 60, vy: 0, vx: 0, jumpPower: -12, gravity: 0.45 };
        let platforms = [];
        let score = 0;
        let highscore = localStorage.getItem('eagleRecord') || 0;
        let moveLeft = false;
        let moveRight = false;

        for (let i = 0; i < 7; i++) {
            platforms.push({ x: Math.random() * (canvas.width - 60), y: canvas.height - (i * 80), width: 60, height: 12 });
        }
        platforms.push({ x: 110, y: 380, width: 100, height: 15 });

        // --- CONTRÔLES ---
        canvas.addEventListener('touchstart', (e) => {
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) moveLeft = true;
            else moveRight = true;
            e.preventDefault();
        }, {passive: false});
        canvas.addEventListener('touchend', () => { moveLeft = false; moveRight = false; });

        function update() {
            if (moveLeft) eagle.vx = -7;
            else if (moveRight) eagle.vx = 7;
            else eagle.vx *= 0.8;

            eagle.x += eagle.vx;
            eagle.vy += eagle.gravity;
            eagle.y += eagle.vy;

            if (eagle.x + eagle.width < 0) eagle.x = canvas.width;
            if (eagle.x > canvas.width) eagle.x = -eagle.width;

            if (eagle.vy > 0) {
                platforms.forEach(p => {
                    if (eagle.x + eagle.width > p.x && eagle.x < p.x + p.width &&
                        eagle.y + eagle.height > p.y && eagle.y + eagle.height < p.y + p.height + eagle.vy) {
                        eagle.vy = eagle.jumpPower;
                    }
                });
            }

            if (eagle.y < canvas.height * 0.7) {
                let diff = (canvas.height * 0.7) - eagle.y;
                eagle.y = canvas.height * 0.7;
                score += Math.floor(diff);
                platforms.forEach(p => {
                    p.y += diff;
                    if (p.y > canvas.height) { p.y = 0; p.x = Math.random() * (canvas.width - 60); }
                });
            }

            if (eagle.y > canvas.height) { 
                if (score > highscore) { highscore = score; localStorage.setItem('eagleRecord', highscore); }
                eagle.y = 100; eagle.vy = 0; score = 0; 
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Un ciel avec un dégradé subtil
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#87CEEB");
            gradient.addColorStop(1, "#E0F7FA");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // DESSIN AIGLE 🦅
            if (eagleLoaded) {
                ctx.drawImage(imgEagle, eagle.x, eagle.y, eagle.width, eagle.height);
            } else {
                // Si l'image n'est TOUJOURS pas trouvée, au moins on la dessine en or
                ctx.fillStyle = "#FBC02D";
                ctx.fillRect(eagle.x, eagle.y, eagle.width, eagle.height);
            }

            // DESSIN PLATEFORMES ✨ (Look Or)
            platforms.forEach(p => {
                // Ombre
                ctx.fillStyle = "#B7950B"; ctx.fillRect(p.x, p.y + 4, p.width, p.height);
                // Couleur Or
                ctx.fillStyle = "#F4D03F"; ctx.fillRect(p.x, p.y, p.width, p.height);
            });

            // AFFICHAGE SCORE
            ctx.fillStyle = "#2C3E50";
            ctx.font = "bold 22px Arial";
            ctx.fillText("Alt: " + score + "m", 15, 38);
            ctx.font = "14px Arial";
            ctx.fillText("Record: " + highscore + "m", 15, 62);
        }
        update();
    </script>
</body>
</html>
